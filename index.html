<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daly Alpha</title>
<!-- إعدادات تطبيق الهاتف (PWA) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daly Alpha">
<link rel="apple-touch-icon" href="camp.png">

<!-- خط تجوال -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<!-- Tesseract.js: OCR بدون API key -->
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
  :root {
    --bg: #f8f9fa;
    --card: #ffffff;
    --text: #2b2d42;
    --muted: #8d99ae;
    --border: #e2e8f0;
    --input: #f1f5f9;
    --input-focus: #ffffff;
    --out: #f8fafc;
    --btn: #d97706;
    --btn-hover: #b45309;
    --btnText: #ffffff;
    --shadow: rgba(0, 0, 0, 0.05);
    --shadow-hover: rgba(0, 0, 0, 0.1);
    --primary-glow: rgba(217, 119, 6, 0.2);
    --error-bg: #fee2e2;
    --error-text: #b91c1c;
    --error-border: #fca5a5;
  }
  
  body.dark {
    --bg: #0f1115;
    --card: #1a1d24;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #2a3040;
    --input: #111522;
    --input-focus: #1e2538;
    --out: #111522;
    --btn: #f59e0b;
    --btn-hover: #fbbf24;
    --btnText: #111827;
    --shadow: rgba(0, 0, 0, 0.3);
    --shadow-hover: rgba(0, 0, 0, 0.5);
    --primary-glow: rgba(245, 158, 11, 0.15);
    --error-bg: #450a0a;
    --error-text: #fecaca;
    --error-border: #991b1b;
  }

  body { font-family: 'Tajawal', Arial, sans-serif; max-width: 760px; margin: auto; padding: 20px 14px; background: var(--bg); color: var(--text); transition: background-color 0.3s ease, color 0.3s ease; }

  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 24px; position: relative; z-index: 5; }
  .langBtns { display: flex; gap: 8px; background: var(--card); padding: 6px; border-radius: 16px; box-shadow: 0 2px 10px var(--shadow); border: 1px solid var(--border); }
  .langBtn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border: none; border-radius: 10px; background: transparent; cursor: pointer; font-size: 14px; font-weight: 700; font-family: inherit; color: var(--muted); transition: all 0.2s ease; }
  .langBtn:hover { color: var(--text); background: var(--input); }
  .langBtn.active { background: var(--btn); color: var(--btnText); box-shadow: 0 4px 12px var(--primary-glow); }
  .toggles { display: flex; }
  .toggleBtn { padding: 10px 18px; border: 1px solid var(--border); border-radius: 14px; background: var(--card); cursor: pointer; font-size: 14px; font-weight: 700; font-family: inherit; color: var(--text); box-shadow: 0 2px 10px var(--shadow); transition: all 0.2s ease; }
  .toggleBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px var(--shadow-hover); }

  @media (max-width: 720px) { .topbar { flex-direction: column; align-items: stretch; } .langBtns { justify-content: center; flex-wrap: wrap; } .toggles { justify-content: center; flex-wrap: wrap; } }

  .hero-container { text-align: center; margin: 15px auto 35px auto; display: flex; justify-content: center; align-items: center; position: relative; z-index: 1; }
  .hero-container::before { content: ""; position: absolute; width: 220px; height: 220px; background: radial-gradient(circle, var(--primary-glow) 0%, transparent 65%); border-radius: 50%; z-index: -1; animation: pulseGlow 3s infinite alternate ease-in-out; filter: blur(15px); pointer-events: none; }
  .hero-image { max-width: 260px; height: auto; object-fit: contain; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3)); transition: transform 0.4s ease, filter 0.4s ease; animation: floatCamp 4s ease-in-out infinite; pointer-events: none; }
  @keyframes floatCamp { 0% { transform: translateY(0px); } 50% { transform: translateY(-12px); } 100% { transform: translateY(0px); } }
  @keyframes pulseGlow { from { transform: scale(0.85); opacity: 0.6; } to { transform: scale(1.2); opacity: 1; } }

  h2#title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 5px 0 25px;
    position: relative;
    z-index: 2;
  }
  .daly-text {
    font-size: 40px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
    text-shadow: 0 4px 15px var(--shadow);
  }
  .alpha-badge {
    position: relative;
    font-size: 14px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    padding: 6px 12px 6px 15px; 
    border-radius: 12px;
    background: linear-gradient(135deg, var(--btn), var(--btn-hover));
    color: var(--btnText);
    box-shadow: 0 6px 20px var(--primary-glow), 
                inset 0 2px 4px rgba(255,255,255,0.4), 
                inset 0 -2px 6px rgba(0,0,0,0.2);
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    line-height: 1;
    font-family: 'Arial', sans-serif;
  }
  .alpha-badge::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
    transform: skewX(-20deg);
    animation: badgeShine 3.5s infinite ease-in-out;
  }
  @keyframes badgeShine {
    0% { left: -100%; }
    20% { left: 200%; }
    100% { left: 200%; }
  }

  .muted { color: var(--muted); font-size: 15px; text-align: center; margin-bottom: 20px; font-weight: 500; position: relative; z-index: 2; }

  .box { border: 1px solid var(--border); border-radius: 24px; padding: 24px; margin: 10px 0; background: var(--card); box-shadow: 0 10px 30px var(--shadow); transition: all 0.3s ease; position: relative; z-index: 2; }

  /* ===== منطقة رفع الصورة الجديدة ===== */
  .upload-section { margin-bottom: 22px; }

  /* ===== (API Key مدمج في الـ Worker — لا حاجة لحقل إدخال) ===== */
  .upload-label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .upload-label::before, .upload-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .upload-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .upload-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 16px 8px; border-radius: 18px; border: 1.5px solid var(--border);
    background: var(--card); cursor: pointer; transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
    position: relative; overflow: hidden; text-align: center;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .upload-btn input[type="file"] {
    position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5;
  }
  .upload-btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 8px 24px var(--shadow-hover); border-color: var(--btn); }
  .upload-btn:active { transform: scale(0.97); }

  .upload-btn-icon {
    width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; transition: transform 0.3s ease;
  }
  .upload-btn:hover .upload-btn-icon { transform: scale(1.12) rotate(-5deg); }

  .upload-btn-label { font-size: 12px; font-weight: 800; color: var(--text); line-height: 1.2; pointer-events: none; }
  .upload-btn-sub   { font-size: 10px; font-weight: 500; color: var(--muted); pointer-events: none; }

  .upload-btn.gallery  .upload-btn-icon { background: linear-gradient(135deg,#fbbf24,#d97706); }
  .upload-btn.camera   .upload-btn-icon { background: linear-gradient(135deg,#34d399,#059669); }
  .upload-btn.file     .upload-btn-icon { background: linear-gradient(135deg,#818cf8,#4f46e5); }

  .upload-preview {
    display: none; align-items: center; gap: 12px; margin-top: 12px;
    padding: 10px 14px; border-radius: 14px;
    background: linear-gradient(135deg,rgba(52,211,153,.12),rgba(5,150,105,.06));
    border: 1px solid rgba(52,211,153,.35);
  }
  .upload-preview.show { display: flex; }
  .upload-preview-thumb { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .upload-preview-info  { flex: 1; min-width: 0; }
  .upload-preview-name  { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upload-preview-size  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .upload-preview-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); padding: 0 4px; flex-shrink: 0; }
  
  .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; flex-direction: column; color: white; font-weight: bold; z-index: 999; border-radius: 24px; }
  .spinner { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.2); border-top-color: var(--btn); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .inputs-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; position: relative; z-index: 3; }
  .input-wrapper { background: var(--input); border: 2px solid transparent; border-radius: 16px; padding: 12px; transition: all 0.3s ease; }
  .input-wrapper:focus-within { background: var(--input-focus); border-color: var(--btn); box-shadow: 0 0 0 4px var(--primary-glow); }

  label { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-weight: 800; font-size: 15px; color: var(--text); }
  .game-icon { width: 36px; height: 36px; object-fit: contain; vertical-align: middle; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); transition: transform 0.3s ease; }
  .input-wrapper:hover .game-icon { transform: scale(1.1) rotate(-5deg); }

  input[type="text"] { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; font-weight: 700; font-family: inherit; text-align: center; background: var(--card); color: var(--text); box-sizing: border-box; transition: all 0.2s ease; }
  input[type="text"]:focus { outline: none; border-color: var(--btn); }

  .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; position: relative; z-index: 3; }
  button { font-family: inherit; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease; }
  button.primary { flex: 1 1 45%; padding: 16px; border: 0; border-radius: 16px; background: var(--btn); color: var(--btnText); font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px var(--primary-glow); }
  button.primary:hover { background: var(--btn-hover); transform: translateY(-2px); box-shadow: 0 6px 20px var(--primary-glow); }
  button.primary.smart { background: linear-gradient(135deg, #7c5cff, #2bb4ff); box-shadow: 0 4px 15px rgba(124, 92, 255, 0.25); }
  button.primary.smart:hover { background: linear-gradient(135deg, #6a4ce6, #1fa3e6); box-shadow: 0 6px 20px rgba(124, 92, 255, 0.35); }
  button.secondary { flex: 1 1 30%; padding: 14px; border: 1px solid var(--border); border-radius: 14px; background: var(--card); color: var(--text); font-size: 15px; cursor: pointer; }
  button.secondary:hover { background: var(--input); transform: translateY(-2px); border-color: var(--muted); }

  .out { background: var(--out); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-top: 20px; white-space: pre-wrap; position: relative; overflow: hidden; font-weight: 500; line-height: 1.7; font-size: 15px; transform: translateZ(0); box-shadow: inset 0 2px 10px var(--shadow); transition: all 0.3s ease; }
  .out.error { background: var(--error-bg); color: var(--error-text); border-color: var(--error-border); box-shadow: inset 0 2px 10px rgba(220, 38, 38, 0.1); }
  .out.flash::before { content: ""; position: absolute; inset: -60%; background: radial-gradient(circle at 50% 50%, var(--primary-glow), transparent 60%); animation: pop 600ms ease-out; pointer-events: none; }
  @keyframes pop { from { transform: scale(0.5); opacity: 0; } 50% { opacity: 1; } to { transform: scale(1.2); opacity: 0; } }

  .pill { display: inline-flex; align-items: center; justify-content: center; padding: 4px 12px; border: 1px solid var(--border); border-radius: 999px; font-size: 13px; font-weight: 700; margin: 4px 3px; color: var(--text); background: var(--card); box-shadow: 0 2px 5px var(--shadow); }

  .signature { margin-top: 24px; text-align: center; font-size: 15px; padding: 16px; border-radius: 16px; background: linear-gradient(135deg, #1e1e1e, #2b2b2b); color: #cfcfcf; box-shadow: 0 10px 25px rgba(0,0,0,0.15); font-weight: 500; position: relative; z-index: 2; }
  .signature span { font-weight: 900; font-size: 18px; background: linear-gradient(45deg, #ffcc70, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }

  .chartWrap { margin-top: 24px; display: flex; gap: 20px; align-items: stretch; justify-content: center; flex-wrap: wrap; }
  .chartCard { flex: 0 0 auto; width: 250px; height: 250px; border-radius: 24px; border: 1px solid var(--border); background: var(--card); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: inset 0 4px 15px var(--shadow), 0 10px 30px var(--shadow); }
  canvas#chart { width: 220px; height: 220px; filter: drop-shadow(0 0 4px rgba(0,0,0,0.05)); }
  .chartCenter { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; text-align: center; }
  .chartCenter .ratio { font-size: 34px; font-weight: 900; letter-spacing: 1px; margin-bottom: 2px; color: var(--text); text-shadow: 0 2px 10px var(--shadow); }
  .chartCenter .small { font-size: 13px; font-weight: 700; color: var(--muted); }
  
  .legend { flex: 1 1 240px; min-width: 240px; border-radius: 20px; border: 1px solid var(--border); background: var(--out); padding: 20px; display: flex; flex-direction: column; justify-content: center; box-shadow: inset 0 2px 10px var(--shadow); }
  .legend h3 { margin: 0 0 12px 0; font-size: 15px; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 16px; border-radius: 14px; background: var(--card); border: 1px solid var(--border); margin: 6px 0; box-shadow: 0 4px 10px var(--shadow); transition: transform 0.2s ease; }
  .row:hover { transform: scale(1.02); }
  .left { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 15px; }
  .dot { width: 14px; height: 14px; border-radius: 999px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 0 3px var(--input); }
  .pct { font-weight: 900; font-size: 18px; white-space: nowrap; }

  .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); background: var(--text); border: none; color: var(--bg); padding: 12px 24px; border-radius: 999px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; font-size: 15px; font-weight: 700; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .smartBox { margin-top: 20px; padding: 20px; border-radius: 20px; background: linear-gradient(145deg, rgba(124, 92, 255, 0.08), rgba(43, 180, 255, 0.08)); border: 1px solid rgba(124, 92, 255, 0.3); text-align: start; line-height: 1.7; box-shadow: inset 0 0 20px rgba(124, 92, 255, 0.05); }
  .smartBox h3 { margin: 0 0 8px 0; font-size: 18px; font-weight: 800; color: #7c5cff; }
  .dark .smartBox h3 { color: #a48cff; }
  .smartBox .muted { font-size: 14px; margin-bottom: 14px; font-weight: 500; }
  .smartGrid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
  .smartBox .pill { background: var(--card); border: 1px solid rgba(124, 92, 255, 0.2); padding: 10px 16px; font-size: 14px; justify-content: flex-start; }
  .smartWhyText { margin-top: 10px; font-size: 14px; font-weight: 500; }
  .smartWhyText ul { margin: 8px 0; padding-inline-start: 24px; }
  .smartWhyText li { margin-bottom: 6px; }

</style>
</head>

<body>

<div class="topbar">
  <div class="langBtns" role="group" aria-label="Language">
    <button class="langBtn" type="button" id="btn-ar" onclick="setLang('ar')">🇸🇦 العربية</button>
    <button class="langBtn" type="button" id="btn-en" onclick="setLang('en')">🇺🇸 English</button>
    <button class="langBtn" type="button" id="btn-pt" onclick="setLang('pt')">🇧🇷 Português</button>
  </div>
  <div class="toggles">
    <button class="toggleBtn" type="button" id="darkBtn" onclick="toggleDark()">🌙 Dark</button>
  </div>
</div>

<div class="hero-container">
  <img src="camp.png" alt="Daly Camp" class="hero-image" onerror="this.style.display='none'">
</div>

<!-- الشعار الاحترافي -->
<h2 id="title">
  <span class="daly-text">Daly</span><span class="alpha-badge">ALPHA</span>
</h2>

<div class="muted" id="hint">
  اكتب مثل: <span class="pill">360k</span> <span class="pill">1.1m</span>
</div>

<div class="box">
  
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingText" style="font-size: 16px; text-align:center;">🤖 جاري تحليل الأرقام بدقة عالية...</div>
  </div>

  <!-- منطقة رفع الصورة الجديدة -->
  <div class="upload-section" id="uploadArea">
    <div class="upload-label" id="uploadText">📷 رفع تقرير الاستطلاع</div>

    <div class="upload-btns">
      <!-- مكتبة الصور -->
      <div class="upload-btn gallery">
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
        <div class="upload-btn-icon">🖼️</div>
        <div class="upload-btn-label" id="uploadLblGallery">مكتبة الصور</div>
        <div class="upload-btn-sub" id="uploadSubGallery">اختر من ألبومك</div>
      </div>

      <!-- التقاط صورة -->
      <div class="upload-btn camera">
        <input type="file" accept="image/*" capture="environment" onchange="handleImageUpload(event)">
        <div class="upload-btn-icon">📷</div>
        <div class="upload-btn-label" id="uploadLblCamera">التقاط صورة</div>
        <div class="upload-btn-sub" id="uploadSubCamera">افتح الكاميرا</div>
      </div>

      <!-- اختيار ملف -->
      <div class="upload-btn file">
        <input type="file" accept="image/*,.png,.jpg,.jpeg,.webp" onchange="handleImageUpload(event)">
        <div class="upload-btn-icon">📁</div>
        <div class="upload-btn-label" id="uploadLblFile">اختيار ملف</div>
        <div class="upload-btn-sub" id="uploadSubFile">من الجهاز</div>
      </div>

    </div>

    <!-- معاينة الصورة المرفوعة -->
    <div class="upload-preview" id="uploadPreview">
      <img class="upload-preview-thumb" id="uploadThumb" src="" alt="preview">
      <div class="upload-preview-info">
        <div class="upload-preview-name" id="uploadFileName">—</div>
        <div class="upload-preview-size" id="uploadFileSize">—</div>
      </div>
      <button class="upload-preview-close" onclick="clearUpload()" title="إلغاء">✕</button>
    </div>
  </div>

  <div class="inputs-container">
    <div class="input-wrapper">
      <label id="lblSni">
        <img src="sniper.png" class="game-icon" alt="sniper" onerror="this.style.display='none'">
        <span>قناص دالي</span>
      </label>
      <input id="enSni" type="text" placeholder="مثال: 360.0k" />
    </div>

    <div class="input-wrapper">
      <label id="lblInf">
        <img src="fighter.png" class="game-icon" alt="fighter" onerror="this.style.display='none'">
        <span>مقاتل دالي</span>
      </label>
      <input id="enInf" type="text" placeholder="مثال: 360.0k" />
    </div>

    <div class="input-wrapper">
      <label id="lblCav">
        <img src="cavalry.png" class="game-icon" alt="cavalry" onerror="this.style.display='none'">
        <span>جوال دالي</span>
      </label>
      <input id="enCav" type="text" placeholder="مثال: 1.1m" />
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="calc()" id="calcBtn">⚔️ اعطني أفضل نوعين + النسبة</button>
    <button class="primary smart" onclick="smartAnalyze()" id="smartBtn">🧠 تحليل ذكي</button>
    <button class="secondary" onclick="copyResult()" id="copyBtn">📋 نسخ النتيجة</button>
    <button class="secondary" onclick="shareResult()" id="shareBtn">🔗 مشاركة</button>
    <button class="secondary" onclick="resetAll()" id="resetBtn">♻️ إعادة ضبط</button>
  </div>

  <div id="out" class="out">ادخل الأرقام واضغط الزر.</div>
  <div id="smartBox" class="smartBox" style="display:none"></div>
  
  <div class="chartWrap" id="chartWrap" style="display:none">
    <div class="chartCard">
      <canvas id="chart" width="220" height="220"></canvas>
      <div class="chartCenter">
        <div class="ratio" id="ratioText">70 / 30</div>
        <div class="small" id="ratioHint">النسبة المثالية</div>
      </div>
    </div>
    <div class="legend">
      <h3 id="legendTitle">التوصية</h3>

/* ================== قراءة الصورة بـ Tesseract OCR (بدون API key) ================== */

/* ─── Otsu's Method: إيجاد أفضل عتبة ثنائية تلقائياً لكل صورة ─── */
function otsuThreshold(gray) {
    const hist = new Array(256).fill(0);
    for (let i = 0; i < gray.length; i++) hist[gray[i]]++;
    const total = gray.length;
    let sum = 0;
    for (let i = 0; i < 256; i++) sum += i * hist[i];
    let sumB = 0, wB = 0, maxVar = 0, bestT = 128;
    for (let t = 0; t < 256; t++) {
        wB += hist[t];
        if (wB === 0) continue;
        const wF = total - wB;
        if (wF === 0) break;
        sumB += t * hist[t];
        const v = wB * wF * Math.pow(sumB/wB - (sum-sumB)/wF, 2);
        if (v > maxVar) { maxVar = v; bestT = t; }
    }
    return bestT;
}

/* ─── صورة بـ Otsu binarization (أنظف بكثير من CSS contrast) ─── */
function makeOtsuImage(file, scale, cropTop, cropBottom) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            const ct = cropTop || 0, cb = cropBottom || 1;
            const sY = Math.floor(img.height * ct);
            const sH = Math.floor(img.height * (cb - ct));
            const W = Math.round(img.width * scale);
            const H = Math.round(sH * scale);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = W; canvas.height = H;
            ctx.drawImage(img, 0, sY, img.width, sH, 0, 0, W, H);

            const imgData = ctx.getImageData(0, 0, W, H);
            const d = imgData.data;
            const len = W * H;

            // تحويل إلى رمادي
            const gray = new Uint8Array(len);
            for (let i = 0; i < len; i++)
                gray[i] = Math.round(0.299*d[i*4] + 0.587*d[i*4+1] + 0.114*d[i*4+2]);

            // Otsu threshold
            const thr = otsuThreshold(gray);
            console.log(`🎯 Otsu threshold=${thr} (crop ${ct}-${cb})`);

            // تطبيق العتبة + عدّ البكسلات الداكنة
            let darkCount = 0;
            for (let i = 0; i < len; i++) {
                const val = gray[i] > thr ? 255 : 0;
                d[i*4] = d[i*4+1] = d[i*4+2] = val;
                if (val === 0) darkCount++;
            }

            // قلب الألوان إذا الخلفية داكنة (نص فاتح على خلفية غامقة)
            if (darkCount > len * 0.5) {
                for (let i = 0; i < len; i++)
                    d[i*4] = d[i*4+1] = d[i*4+2] = 255 - d[i*4];
                console.log("🔄 Inverted (dark bg)");
            }

            ctx.putImageData(imgData, 0, 0);
            canvas.toBlob(blob => { resolve(blob); URL.revokeObjectURL(img.src); }, 'image/png');
        };
        img.onerror = () => reject(new Error("فشل تحميل الصورة"));
        img.src = URL.createObjectURL(file);
    });
}

/* ─── صورة بفلتر CSS (grayscale + contrast) ─── */
function makeFilterImage(file, scale, filterStr, cropTop, cropBottom) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            const ct = cropTop || 0, cb = cropBottom || 1;
            const sY = Math.floor(img.height * ct);
            const sH = Math.floor(img.height * (cb - ct));
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width  = Math.round(img.width * scale);
            canvas.height = Math.round(sH * scale);
            ctx.filter = filterStr;
            ctx.drawImage(img, 0, sY, img.width, sH, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(blob => { resolve(blob); URL.revokeObjectURL(img.src); }, 'image/png');
        };
        img.onerror = () => reject(new Error("فشل تحميل الصورة"));
        img.src = URL.createObjectURL(file);
    });
}

/* ─── تنظيف نص كلمة OCR + تصحيح أخطاء شائعة ─── */
function cleanTroopWord(raw) {
    let t = (raw || "").trim().replace(/\s/g, '');
    // تصحيح أخطاء OCR الشائعة
    t = t.replace(/[oO]/g, '0');
    t = t.replace(/[lI|!]/g, '1');
    t = t.replace(/,/g, '.');
    t = t.toLowerCase();
    // إزالة أحرف غير مطلوبة
    t = t.replace(/^[^0-9]+/, '');
    t = t.replace(/[^0-9km.]+$/, '');
    // مطابقة نمط القوات
    const m = t.match(/(\d+\.?\d*[km])/i);
    if (m) return m[1];
    if (/^0$/.test(t)) return '0';
    return null;
}

/* --- استخراج ذكي: باستخدام مواقع الكلمات (bbox) للعثور على 3 أرقام على نفس الصف --- */
function extractTroopsFromWords(words, imgHeight) {
    const troopWords = [];
    for (const w of (words || [])) {
        if ((w.confidence || 0) < 15) continue;
        const cleaned = cleanTroopWord(w.text);
        if (cleaned) {
            troopWords.push({ ...w, cleanVal: cleaned });
        }
    }

    if (troopWords.length < 2) return null;

    troopWords.sort((a, b) => a.bbox.y0 - b.bbox.y0);

    const yTol = Math.max(40, imgHeight * 0.04);
    const rows = [];
    let currentRow = [troopWords[0]];
    for (let i = 1; i < troopWords.length; i++) {
        if (Math.abs(troopWords[i].bbox.y0 - currentRow[0].bbox.y0) < yTol) {
            currentRow.push(troopWords[i]);
        } else {
            rows.push(currentRow);
            currentRow = [troopWords[i]];
        }
    }
    rows.push(currentRow);

    console.log("🔍 صفوف:", rows.map(r => r.map(w => w.cleanVal + '(' + Math.round(w.confidence) + ')')));

    // 🏆 صف بـ 3 أرقام
    let best = rows.find(r => r.length === 3);
    // أو: صف بـ 2 رقم (الثالث = 0)
    if (!best) best = rows.find(r => r.length === 2);
    if (!best) return null;

    // ترتيب من يسار لليمين = مقاتل ← قناص ← جوال
    best.sort((a, b) => a.bbox.x0 - b.bbox.x0);
    const vals = best.map(w => w.cleanVal);
    while (vals.length < 3) vals.push('0');

    return {
        fighter: vals[0], sniper: vals[1], cavalry: vals[2],
        words: best // نحفظ الكلمات الأصلية للثقة
    };
}

/* --- استخراج احتياطي من النص الخام --- */
function extractTroopsFromText(rawText) {
    const text = rawText.toLowerCase().trim();
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

    function isSummaryLine(line) {
        return /حول|about|إجمالي|total|around|تقريب/i.test(line);
    }

    function numsFromLine(line) {
        const result = [];
        const pat = /(\d+\.?\d*\s*[km])|\b(0)\b/gi;
        let m;
        while ((m = pat.exec(line)) !== null) {
            if (m[1]) result.push(m[1].replace(/\s/g, '').toLowerCase());
            else result.push('0');
        }
        return result;
    }

    const filteredLines = lines.filter(l => !isSummaryLine(l));

    let c = [];
    for (const line of filteredLines) {
        const nums = numsFromLine(line);
        if (nums.length === 3) { c = nums; break; }
    }
    if (c.length < 3) {
        for (const line of filteredLines) {
            const nums = numsFromLine(line);
            if (nums.length === 2 && nums.every(n => /[km]$/.test(n))) {
                c = [...nums, "0"]; break;
            }
        }
    }
    if (c.length < 3) {
        c = [];
        for (const line of filteredLines) {
            const nums = numsFromLine(line);
            if (nums.length === 1 && /^\d+\.?\d*m$/.test(nums[0])) continue;
            for (const n of nums) { c.push(n); if (c.length >= 3) break; }
            if (c.length >= 3) break;
        }
    }
    return { fighter: c[0]||"0", sniper: c[1]||"0", cavalry: c[2]||"0" };
}

/* --- تشغيل OCR مرة واحدة --- */
async function runOCRPass(blob, params, logger) {
    const worker = await Tesseract.createWorker('eng', 1, { logger });
    if (params) await worker.setParameters(params);
    const { data } = await worker.recognize(blob);
    await worker.terminate();
    return data;
}

/* --- استخراج القوات من نتيجة OCR --- */
function extractFromData(data) {
    const imgH = (data.words||[]).reduce((max, w) => Math.max(max, w.bbox.y1||0), 1);
    return extractTroopsFromWords(data.words, imgH)
        || extractTroopsFromText(data.text || "");
}

/* --- هل القيمة رقم قوات صالح (غير صفري)؟ --- */
function isValidTroop(v) {
    return /^\d+\.?\d*[km]$/i.test((v||"").toLowerCase());
}

/* --- تصويت بالإجماع: اختيار أفضل قيمة لكل حقل من عدة نتائج --- */
function consensusVote(allParsed, allData) {
    const fields = ['fighter', 'sniper', 'cavalry'];
    const result = {};

    for (const field of fields) {
        const candidates = [];

        for (let i = 0; i < allParsed.length; i++) {
            const val = (allParsed[i]?.[field] || "0").toLowerCase();
            if (!isValidTroop(val)) continue;

            // حساب الثقة من كلمات OCR
            let conf = 50;
            const savedWords = allParsed[i]?.words;
            if (savedWords) {
                const matched = savedWords.find(w => w.cleanVal === val);
                if (matched) conf = matched.confidence || 50;
            }
            if (!savedWords && allData[i]) {
                const matched = (allData[i].words||[]).find(w => cleanTroopWord(w.text) === val);
                if (matched) conf = matched.confidence || 50;
            }

            candidates.push({ val, conf, pass: i });
        }

        if (candidates.length === 0) {
            result[field] = "0";
            continue;
        }

        if (candidates.length === 1) {
            result[field] = candidates[0].val;
            continue;
        }

        // عدّ التكرارات: إذا 2+ تمريرات اتفقت → إجماع
        const counts = {};
        for (const c of candidates) {
            counts[c.val] = (counts[c.val] || 0) + 1;
        }

        let majority = null;
        let majorityCount = 0;
        for (const [val, count] of Object.entries(counts)) {
            if (count > majorityCount) {
                majority = val;
                majorityCount = count;
            }
        }

        if (majorityCount >= 2) {
            result[field] = majority;
            console.log(`  ✅ ${field}: "${majority}" (إجماع ${majorityCount}/${candidates.length})`);
        } else {
            // لا إجماع → أعلى ثقة
            candidates.sort((a, b) => b.conf - a.conf);
            result[field] = candidates[0].val;
            console.log(`  ⚖️ ${field}: "${candidates[0].val}" (أعلى ثقة ${Math.round(candidates[0].conf)}) من ${candidates.map(c=>'"'+c.val+'"').join(' vs ')}`);
        }
    }

    return result;
}

/* ============== الدالة الرئيسية لرفع الصورة (3 تمريرات + قص + إجماع) ============== */
async function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    showUploadPreview(file);
    document.getElementById("out").classList.remove("error");

    const overlay  = document.getElementById("loadingOverlay");
    const loadText = document.getElementById("loadingText");
    overlay.style.display = "flex";

    try {
        if (typeof Tesseract === "undefined") {
            throw new Error("مكتبة OCR لم تُحمَّل. تحقق من اتصال الإنترنت وأعد تحميل الصفحة.");
        }

        // ① إنشاء 3 نسخ بتقنيات مختلفة
        if (loadText) loadText.innerText = "🖼️ تحسين الصورة...";
        const [imgA, imgB, imgC] = await Promise.all([
            // A: Otsu binarization كاملة 3x → نص أسود على أبيض نظيف
            makeOtsuImage(file, 3),
            // B: CSS تباين عالي 2x + whitelist → أرقام نظيفة
            makeFilterImage(file, 2, 'grayscale(100%) contrast(200%)'),
            // C: Otsu + قص وسط الصورة (15%-70%) → تركيز على منطقة القوات فقط
            makeOtsuImage(file, 3, 0.15, 0.70)
        ]);

        // ② تشغيل 3 تمريرات OCR بالتوازي
        if (loadText) loadText.innerText = "🔍 قراءة ثلاثية متوازية...";
        let progressA = 0, progressC = 0;
        const updateProgress = () => {
            if (loadText) loadText.innerText = `🔍 ${Math.round(((progressA + progressC) / 2) * 100)}%`;
        };

        const [dataA, dataB, dataC] = await Promise.all([
            // Pass A: بدون whitelist → يقرأ "1.1m" كاملة
            runOCRPass(imgA, { tessedit_pageseg_mode: '11' }, m => {
                if (m.status === 'recognizing text') { progressA = m.progress||0; updateProgress(); }
            }),
            // Pass B: مع whitelist + تباين عالي → أرقام نظيفة
            runOCRPass(imgB, {
                tessedit_char_whitelist: '0123456789.kKmM ',
                tessedit_pageseg_mode: '11'
            }, () => {}),
            // Pass C: صورة مقصوصة بدون whitelist → تركيز على القوات فقط
            runOCRPass(imgC, { tessedit_pageseg_mode: '11' }, m => {
                if (m.status === 'recognizing text') { progressC = m.progress||0; updateProgress(); }
            })
        ]);

        console.log("═══════════════════════════════════════");
        console.log("🔍 Pass A (Otsu 3x, no-whitelist):", dataA.text);
        console.log("🔍 Pass B (contrast 2x, whitelist):", dataB.text);
        console.log("🔍 Pass C (Otsu cropped, no-whitelist):", dataC.text);
        console.log("═══════════════════════════════════════");

        // ③ استخراج القوات من كل نتيجة
        const parsedA = extractFromData(dataA);
        const parsedB = extractFromData(dataB);
        const parsedC = extractFromData(dataC);

        console.log("📊 Parsed A:", JSON.stringify(parsedA));
        console.log("📊 Parsed B:", JSON.stringify(parsedB));
        console.log("📊 Parsed C:", JSON.stringify(parsedC));

        // ④ تصويت بالإجماع: اختيار أفضل قيمة لكل حقل
        if (loadText) loadText.innerText = "🧠 مقارنة النتائج...";
        let allParsed = [parsedA, parsedB, parsedC];
        let allData   = [dataA,   dataB,   dataC];

        // ⑤ إذا لم نجد أرقام كافية → تمريرة طوارئ رابعة (PSM 6 على الصورة المقصوصة)
        const validCount = allParsed.reduce((n, p) => {
            const v = [p?.fighter, p?.sniper, p?.cavalry].filter(x => isValidTroop(x));
            return Math.max(n, v.length);
        }, 0);

        if (validCount < 2) {
            console.log("⚠️ أرقام غير كافية → تمريرة طوارئ PSM 6...");
            if (loadText) loadText.innerText = "🔄 محاولة إضافية...";
            const imgD = await makeOtsuImage(file, 2.5, 0.10, 0.75);
            const dataD = await runOCRPass(imgD, { tessedit_pageseg_mode: '6' }, () => {});
            console.log("🔍 Pass D (emergency PSM6):", dataD.text);
            const parsedD = extractFromData(dataD);
            console.log("📊 Parsed D:", JSON.stringify(parsedD));
            allParsed.push(parsedD);
            allData.push(dataD);
        }

        const final = consensusVote(allParsed, allData);
        console.log("🏆 النتيجة النهائية:", JSON.stringify(final));

        const inf = (final.fighter || "0").toLowerCase();
        const sni = (final.sniper  || "0").toLowerCase();
        const cav = (final.cavalry || "0").toLowerCase();

        const isOK = v => /^\d+\.?\d*[km]$|^0$/.test(v);
        if (![inf, sni, cav].some(isOK)) {
            throw new Error("لم يتمكن OCR من قراءة أرقام القوات. جرب صورة أوضح أو أدخل يدوياً.");
        }

        document.getElementById("enInf").value = isOK(inf) ? inf : "0";
        document.getElementById("enSni").value = isOK(sni) ? sni : "0";
        document.getElementById("enCav").value = isOK(cav) ? cav : "0";

        toast(`✅ ${inf} · ${sni} · ${cav}`);
        setTimeout(() => smartAnalyze(), 400);

    } catch(err) {
        console.error("❌ خطأ OCR:", err);
        showSiteError(err.message || "حدث خطأ في قراءة الصورة.");
    } finally {
        overlay.style.display = "none";
        document.querySelectorAll('.upload-btn input[type="file"]').forEach(i => i.value = "");
    }
}

function parseNum(v) {
  v = (v||"").toString().toLowerCase().trim().replace(/,/g,"");
  if(v.endsWith("k")) return (parseFloat(v)||0) * 1000;
  if(v.endsWith("m")) return (parseFloat(v)||0) * 1000000;
  return parseFloat(v)||0;
}

const counterOf = { sni:"cav", inf:"sni", cav:"inf" };
const beatenBy  = { cav:"inf", sni:"cav", inf:"sni" };
function pct(x) { return Math.round(x*100); }
function typeText(type) { const t = T[LANG]; if(type==="sni") return t.sni; if(type==="inf") return t.inf; return t.cav; }

function calc() {
  const en = { 
    sni: parseNum(document.getElementById("enSni").value), 
    inf: parseNum(document.getElementById("enInf").value), 
    cav: parseNum(document.getElementById("enCav").value) 
  };
  const total = en.sni + en.inf + en.cav;
  const t = T[LANG] || T.ar;
  
  document.getElementById("smartBox").style.display = "none";
  if(total <= 0) { showOut(t.err, ""); toast(t.toastNeed || t.err); hideChart(); return; }

  let major = "sni"; 
  if(en.inf > en[major]) major = "inf"; 
  if(en.cav > en[major]) major = "cav";
  
  const A = counterOf[major]; 
  const danger = beatenBy[A]; 
  const B = counterOf[danger];
  const dangerRatio = en[danger] / total;
  
  let aShare;
  if(dangerRatio < 0.18) aShare = 0.80; 
  else if(dangerRatio < 0.30) aShare = 0.70; 
  else if(dangerRatio < 0.45) aShare = 0.65; 
  else aShare = 0.60;
  
  if(B === A) aShare = 1.0;
  const bShare = Math.max(0, 1 - aShare);

  LAST_COPY_TEXT = `${typeText(A)} ${pct(aShare)}% + ${typeText(B)} ${pct(bShare)}%`;
  const out = `${t.headerEnemy}\n${t.sni}: ${en.sni.toLocaleString()}\n${t.inf}: ${en.inf.toLocaleString()}\n${t.cav}: ${en.cav.toLocaleString()}\n\n${t.bestLine} ${LAST_COPY_TEXT}\n\n${t.best}\n1) ${typeText(A)} = ${pct(aShare)}%\n2) ${typeText(B)} = ${pct(bShare)}%\n\n${t.reason1}\n${t.reason2} ${typeText(major)} ${t.reason3} ${typeText(A)}.\n${t.reason4} ${typeText(B)} ${t.reason5} ${typeText(A)}.`;
  
  showOut(out, LAST_COPY_TEXT); 
  showChart(A, B, aShare, bShare);
}

function smartAnalyze() {
  const sni = parseNum(document.getElementById("enSni").value);
  const inf = parseNum(document.getElementById("enInf").value);
  const cav = parseNum(document.getElementById("enCav").value);
  const box = document.getElementById("smartBox"); 
  if(!box) return;
  
  const t = T[LANG] || T.ar; 
  const total = sni + inf + cav;
  if(!total) { box.style.display="none"; showOut(t.enterHint, ""); toast(t.enterHint); hideChart(); return; }

  const e =[sni/total, inf/total, cav/total];
  const counter =[2,0,1]; const losesTo =[2,0,1];      
  const typeLabel = (i) => { if(i===0) return t.sni; if(i===1) return t.inf; return t.cav; };
  const typeKey = (i) => { if(i===0) return "sni"; if(i===1) return "inf"; return "cav"; };

  let E1 = 0; 
  for(let i=1; i<3; i++) if(e[i] > e[E1]) E1 = i;
  
  const P = counter[E1]; 
  const V = losesTo[P]; 
  const S = counter[V];             
  const dominance = e[E1]; 
  const vShare = e[V];

  let primaryPct = 70 + (dominance - 0.50)*30 - vShare*40;
  primaryPct = Math.max(55, Math.min(85, primaryPct)); 
  primaryPct = Math.round(primaryPct/5)*5; 
  primaryPct = Math.max(55, Math.min(85, primaryPct));
  const secondaryPct = 100 - primaryPct;

  const eSni = Math.round(e[0]*100); 
  const eInf = Math.round(e[1]*100); 
  const eCav = Math.round(e[2]*100);
  
  const whyLines =[];
  whyLines.push(`<li>${typeLabel(P)} ${t.smartWhy1} ${typeLabel(E1)}.</li>`);
  if(vShare > 0.18) { 
    whyLines.push(`<li>${t.smartWhy2} ${typeLabel(V)} (${Math.round(vShare*100)}%). ${t.smartWhy3} ${typeLabel(S)}.</li>`); 
  } else { 
    whyLines.push(`<li>${t.smartWhy4}</li>`); 
  }
  whyLines.push(`<li>${t.smartWhy5} <b style="color:var(--btn)">${primaryPct}/${secondaryPct}</b>.</li>`);

  box.innerHTML = `<h3>🧠 ${t.smartTitle}</h3><div class="muted">${t.smartSub}</div><div class="smartGrid"><div class="pill">📊 ${t.smartEnemy}: ${t.sni} ${eSni}% &nbsp;·&nbsp; ${t.inf} ${eInf}% &nbsp;·&nbsp; ${t.cav} ${eCav}%</div><div class="pill">✅ ${t.smartRec}: <b style="margin: 0 5px;">${typeLabel(P)} ${primaryPct}%</b> + <b style="margin: 0 5px;">${typeLabel(S)} ${secondaryPct}%</b></div></div><div class="smartWhyText"><div style="font-weight:800; color:var(--text);">${t.smartWhy}</div><ul>${whyLines.join("")}</ul><div style="margin-top:14px;opacity:.8;font-size:12px;">${t.smartNote}</div></div>`;
  box.style.display = "block";
  
  LAST_COPY_TEXT = `${typeLabel(P)} ${primaryPct}% + ${typeLabel(S)} ${secondaryPct}%`;
  showOut(`✅ ${t.smartRec}: ${LAST_COPY_TEXT}`, LAST_COPY_TEXT);
  showChart(typeKey(P), typeKey(S), primaryPct/100, secondaryPct/100);
}

function showOut(text, copyLine) { 
  const outEl = document.getElementById("out"); 
  outEl.classList.remove("error");
  outEl.classList.remove("flash"); 
  outEl.innerText = text; 
  requestAnimationFrame(()=> outEl.classList.add("flash")); 
  if(!copyLine) LAST_COPY_TEXT = ""; 
}

async function copyResult() {
  const t = T[LANG] || T.ar; 
  const text = LAST_COPY_TEXT || document.getElementById("out").innerText.trim();
  if(!text || text === t.outIdle || document.getElementById("out").classList.contains("error")) { 
    toast(t.toastNeed || t.err); return; 
  }
  
  try { 
    await navigator.clipboard.writeText(text); 
    const btn = document.getElementById("copyBtn"); 
    btn.innerHTML = `✅ ${t.copied.replace('✅ ', '')}`; 
    setTimeout(()=> btn.innerHTML = t.copy, 1500); 
    toast(t.copied); 
  } catch(e) { 
    const ta = document.createElement("textarea"); 
    ta.value = text; 
    document.body.appendChild(ta); 
    ta.select(); 
    document.execCommand("copy"); 
    document.body.removeChild(ta); 
    const btn = document.getElementById("copyBtn"); 
    btn.innerHTML = `✅ ${t.copied.replace('✅ ', '')}`; 
    setTimeout(()=> btn.innerHTML = t.copy, 1500); 
    toast(t.copied); 
  }
}

const TYPE_ICON = { sni:"sniper.png", inf:"fighter.png", cav:"cavalry.png" };
const TYPE_COLOR = { sni:"#1a73e8", inf:"#d97706", cav:"#6d28d9" }; 
let LAST_REC = null; 
let donutAnimFrame = null;

function hideChart() { 
  document.getElementById("chartWrap").style.display = "none"; 
  LAST_REC = null; 
}

function showChart(A, B, aShare, bShare) {
  LAST_REC = {A,B,aShare,bShare}; 
  const t = T[LANG] || T.ar;
  document.getElementById("ratioText").innerText = `${pct(aShare)} / ${pct(bShare)}`; 
  document.getElementById("ratioHint").innerText = t.ratioHint; 
  document.getElementById("nameA").innerText = typeText(A); 
  document.getElementById("nameB").innerText = typeText(B); 
  document.getElementById("iconA").src = TYPE_ICON[A]; 
  document.getElementById("iconB").src = TYPE_ICON[B]; 
  document.getElementById("pctA").innerText = `${pct(aShare)}%`; 
  document.getElementById("pctB").innerText = `${pct(bShare)}%`; 
  document.getElementById("dotA").style.background = TYPE_COLOR[A] || "#4aa3ff"; 
  document.getElementById("dotB").style.background = TYPE_COLOR[B] || "#d97706"; 
  document.getElementById("legendTitle").innerText = t.legendTitle;
  
  drawRealisticDonut(A, B, aShare); 
  document.getElementById("chartWrap").style.display = "flex";
}

function drawRealisticDonut(typeA, typeB, aShare) {
  const canvas = document.getElementById("chart"); 
  const ctx = canvas.getContext("2d"); 
  const W = canvas.width, H = canvas.height; 
  const cx = W / 2, cy = H / 2; 
  const r = Math.min(W, H) / 2 - 20; 
  const thickness = 22;
  
  const getGradient = (type) => { 
    const grad = ctx.createLinearGradient(0, 0, W, H); 
    if (type === "sni") { grad.addColorStop(0, "#80c6ff"); grad.addColorStop(1, "#1a73e8"); } 
    else if (type === "inf") { grad.addColorStop(0, "#fbbf24"); grad.addColorStop(1, "#b45309"); } 
    else if (type === "cav") { grad.addColorStop(0, "#b49afe"); grad.addColorStop(1, "#5b21b6"); } 
    return grad; 
  };
  
  const gradA = getGradient(typeA); 
  const gradB = getGradient(typeB);
  
  if (donutAnimFrame) cancelAnimationFrame(donutAnimFrame); 
  let startTime = null; 
  const duration = 1200; 
  
  function animate(timestamp) {
    if (!startTime) startTime = timestamp; 
    let progress = (timestamp - startTime) / duration; 
    if (progress > 1) progress = 1;
    
    const ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress); 
    ctx.clearRect(0, 0, W, H); 
    const isDark = document.body.classList.contains("dark");
    
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.strokeStyle = isDark ? "#171a21" : "#e2e8f0"; ctx.lineWidth = thickness; ctx.shadowColor = "transparent"; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.strokeStyle = isDark ? "rgba(0,0,0,0.5)" : "rgba(0,0,0,0.05)"; ctx.lineWidth = thickness; ctx.stroke();
    
    const startAngle = -Math.PI / 2; 
    const currentAShare = aShare * ease; 
    const aEnd = startAngle + (Math.PI * 2 * currentAShare); 
    ctx.lineCap = "round";
    
    if (aShare < 1) { 
      const currentBShare = (1 - aShare) * ease; 
      const bEnd = aEnd + (Math.PI * 2 * currentBShare); 
      ctx.beginPath(); ctx.arc(cx, cy, r, aEnd, bEnd); ctx.strokeStyle = gradB; ctx.lineWidth = thickness; ctx.shadowColor = isDark ? "rgba(0,0,0,0.6)" : "rgba(0,0,0,0.25)"; ctx.shadowBlur = 10; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 6; ctx.stroke(); 
    }
    
    ctx.beginPath(); ctx.arc(cx, cy, r, startAngle, aEnd); ctx.strokeStyle = gradA; ctx.lineWidth = thickness; ctx.shadowColor = isDark ? "rgba(0,0,0,0.8)" : "rgba(0,0,0,0.35)"; ctx.shadowBlur = 15; ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 8; ctx.stroke();
    
    if (progress < 1) donutAnimFrame = requestAnimationFrame(animate);
  }
  donutAnimFrame = requestAnimationFrame(animate);
}

function toast(msg) { 
  const el = document.getElementById("toast"); 
  el.innerText = msg; 
  el.classList.add("show"); 
  clearTimeout(toast._t); 
  toast._t = setTimeout(()=> el.classList.remove("show"), 2000); 
}

async function shareResult() { 
  const t = T[LANG] || T.ar; 
  if(!LAST_COPY_TEXT) { toast(t.toastNeed || t.err); return; } 
  const url = location.href; 
  const text = `${t.bestLine} ${LAST_COPY_TEXT}\n${url}`; 
  if(navigator.share) { 
    try{ await navigator.share({ title: document.title, text, url }); toast(t.shared); return; } catch(e){} 
  } 
  try{ await navigator.clipboard.writeText(text); toast(t.shared); } catch(e){ toast(t.copied); } 
}

function resetAll() { 
  document.getElementById("enSni").value = ""; 
  document.getElementById("enInf").value = ""; 
  document.getElementById("enCav").value = ""; 
  LAST_COPY_TEXT = ""; 
  hideChart(); 
  document.getElementById("smartBox").style.display = "none"; 
  const outEl = document.getElementById("out");
  outEl.classList.remove("error");
  outEl.innerText = (T[LANG] || T.ar).outIdle; 
  toast((T[LANG] || T.ar).toastReset || "Reset"); 
}
